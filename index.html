<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RazaTv - Live TV</title>
    <style>
        :root {
            --primary-color: #e50914;
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* Prevent body scroll */
            cursor: none; /* Hide real cursor */
        }
        #custom-cursor {
            width: 32px;
            height: 32px;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="1"><path d="M5.5 2l15 15.84-6.17.06 4.67 7.1-3.5 2.3-4.67-7.1-5.33 4.3z"/></svg>');
            background-size: contain;
            display: block;
        }
        body.fullscreen-mode #custom-cursor {
            display: none;
        }
        .header {
            width: 100%;
            padding: 15px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: var(--primary-color);
            font-weight: bold;
        }
        .player-section {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: center;
            background: #000;
            position: fixed;
            top: 60px; /* Below header */
            left: 0;
            right: 0;
            z-index: 90;
        }
        .video-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            position: relative;
        }
        #main-video {
            width: 100%;
            height: 100%;
            display: block;
        }
        .channel-section {
            padding: 15px;
            margin-top: 520px; /* Offset for fixed header + player */
            height: calc(100vh - 520px);
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .channel-section::-webkit-scrollbar {
            display: none;
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            padding-left: 5px;
            border-left: 4px solid var(--primary-color);
        }
        .list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding-bottom: 50px;
        }
        .channel-item {
            background: #1e1e1e;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #333;
            transition: background 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }
        .channel-item:active, .channel-item.playing {
            background: #2a2a2a;
            border-color: var(--primary-color);
        }
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #888;
            grid-column: 1 / -1;
        }
        #osd {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.2rem;
            z-index: 10001;
            display: none;
            pointer-events: none;
            border-bottom: 2px solid var(--primary-color);
        }
        @media (max-width: 600px) {
            .list-grid {
                grid-template-columns: 1fr 1fr;
            }
            .channel-section {
                margin-top: 320px; /* Adjust for smaller screens */
                height: calc(100vh - 320px);
            }
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="osd">Channel Name</div>
    <div class="header">
        <h1>RAZATV</h1>
    </div>

    <div class="player-section">
        <div class="video-container">
            <video id="main-video" controls playsinline crossorigin="anonymous"></video>
        </div>
    </div>

    <div class="channel-section" id="scroll-container">
        <div class="section-title">ALL CHANNELS</div>
        <div id="channels-container" class="list-grid">
            <div class="loading-spinner">Loading channels...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const playlists = {
            jazz: 'https://raw.githubusercontent.com/hyder1848/Jazz-tv-free/main/Jamalitv_updated_120.m3u',
            zong: 'https://raw.githubusercontent.com/hyder1848/Zong-Tv-Free/main/Zong_Free_Updated.m3u',
            iptv: 'https://iptv-org.github.io/iptv/index.m3u'
        };

        const channelsContainer = document.getElementById('channels-container');
        const scrollContainer = document.getElementById('scroll-container');
        const video = document.getElementById('main-video');
        const osd = document.getElementById('osd');
        const cursor = document.getElementById('custom-cursor');
        
        let hls = null;
        let allChannels = [];
        let currentIndex = 0;
        let osdTimeout;

        // Custom Cursor Logic
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Global wheel scroll for channels
        window.addEventListener('wheel', (e) => {
            scrollContainer.scrollTop += e.deltaY;
        }, { passive: true });

        async function loadAllChannels() {
            channelsContainer.innerHTML = '<div class="loading-spinner">Fetching live links...</div>';
            allChannels = [];

            try {
                const [jazzRes, zongRes, iptvRes] = await Promise.all([
                    fetch(playlists.jazz),
                    fetch(playlists.zong),
                    fetch(playlists.iptv)
                ]);

                const jazzText = await jazzRes.text();
                const zongText = await zongRes.text();
                const iptvText = await iptvRes.text();

                const jazzChannels = parseM3U(jazzText, 'jazz');
                const zongChannels = parseM3U(zongText, 'zong');
                const iptvChannels = parseM3U(iptvText, 'iptv');

                allChannels = [...jazzChannels, ...zongChannels, ...iptvChannels];
                allChannels = allChannels.filter((v, i, a) => a.findIndex(t => (t.url === v.url)) === i);

                // Add a search/filter logic if needed, but for now just render
                renderChannels(allChannels);
                
                if (allChannels.length > 0) {
                    playStream(allChannels[0].url, 0);
                }
            } catch (error) {
                console.error('Error loading playlists:', error);
                channelsContainer.innerHTML = '<div class="loading-spinner">Failed to load channels.</div>';
            }
        }

        function parseM3U(data, type) {
            const lines = data.split('\n');
            const channels = [];
            let currentName = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameParts = line.split(',');
                    let name = nameParts[nameParts.length - 1].trim();
                    if (type === 'zong') {
                        name = name.replace(/Zong TV\s*-\s*/gi, '').trim();
                    }
                    currentName = name;
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        channels.push({ name: currentName, url: line });
                        currentName = '';
                    }
                }
            }
            return channels;
        }

        function renderChannels(channels) {
            channelsContainer.innerHTML = '';
            if (channels.length === 0) {
                channelsContainer.innerHTML = '<div class="loading-spinner">No channels found.</div>';
                return;
            }
            channels.forEach((ch, index) => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerHTML = `<span>${ch.name}</span>`;
                div.onclick = () => playStream(ch.url, index);
                channelsContainer.appendChild(div);
            });
        }

        function showOSD(name) {
            osd.textContent = name;
            osd.style.display = 'block';
            clearTimeout(osdTimeout);
            osdTimeout = setTimeout(() => {
                osd.style.display = 'none';
            }, 2000);
        }

        function playStream(url, index) {
            currentIndex = index;
            document.querySelectorAll('.channel-item').forEach((item, i) => {
                item.classList.toggle('playing', i === index);
            });

            if (Hls.isSupported()) {
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.log("Playback blocked:", e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.oncanplay = () => {
                    video.play().catch(e => console.log("Playback blocked:", e));
                };
            }
            
            showOSD(allChannels[index].name);
        }

        // Fullscreen & Key Navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                let next = currentIndex + 1;
                if (next >= allChannels.length) next = 0;
                playStream(allChannels[next].url, next);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                let prev = currentIndex - 1;
                if (prev < 0) prev = allChannels.length - 1;
                playStream(allChannels[prev].url, prev);
            }
        });

        video.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                document.body.classList.add('fullscreen-mode');
            } else {
                document.body.classList.remove('fullscreen-mode');
            }
        });

        loadAllChannels();
    </script>
</body>
</html>
